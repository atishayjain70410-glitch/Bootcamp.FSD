<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="hospitalmanagementapp.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>
    <h1><i class="fa-solid fa-hospital"></i> Hospital Management System</h1>
</header>

<div class="container">

    <div class="form-section">
        <h2>Patient Registration</h2>

        <form id="patientForm">

            <div class="input-group">
                <label>Patient Name</label>
                <input type="text" id="name" placeholder="Enter Patient Name" required>
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" id="age" placeholder="Enter Age" required>
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="input-group">
                <label>Disease</label>
                <input type="text" id="disease" placeholder="Disease">
            </div>

            <div class="input-group">
                <label>Doctor</label>
                <input type="text" id="doctor" placeholder="Doctor Name">
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="text" id="mobile" placeholder="9876543210">
            </div>

            <div class="input-group">
                <label>Address</label>
                <textarea id="address" rows="3"></textarea>
            </div>

            <button type="submit" id="saveBtn">
                <i class="fa-solid fa-floppy-disk"></i> Save Patient
            </button>

            <button type="reset" class="reset">
                Reset
            </button>

        </form>
    </div>

    <div class="table-section">

        <div class="top-bar">

            <input
                type="text"
                id="search"
                placeholder="Search Patient...">

            <select id="filterGender">
                <option value="All">All Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

        </div>

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Disease</th>
                <th>Doctor</th>
                <th>Mobile</th>
                <th>Address</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="patientTable">

            </tbody>

        </table>

    </div>

</div>

<footer>
    <p>Hospital Management System | HTML • CSS • JavaScript • LocalStorage</p>
</footer>

<script src="hospitalmanagementapp.js"></script>

</body>
</html>
